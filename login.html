<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes — Login</title>
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-card">

.9267 9.72667 34.7887 10.3067 34.7887 10.96C34.7887 11.6133 34.9267 12.1987 35.2027 12.716C35.4787 13.2333 35.8627 13.636 36.3547 13.924C36.8467 14.2013 37.4187 14.34 38.0707 14.34ZM45.4324 16V4.672H47.5924V16H45.4324ZM50.4283 16V4.672H52.5883V14.164H57.4363V16H50.4283Z" fill="currentColor"/>
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="auth-heading">Welcome to Note</h1>
    <p class="auth-subheading">Please log in to continue</p>

    <!-- Error banner -->
    <div id="auth-error" class="auth-error" hidden></div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="auth-email">Email Address</label>
        <input class="auth-input" type="email" id="auth-email" placeholder="email@example.com" autocomplete="email" />
      </div>

      <div class="auth-field">
        <div class="auth-label-row">
          <label class="auth-label" for="auth-password">Password</label>
          <button type="button" class="auth-forgot-btn" id="forgot-btn">Forgot</button>
        </div>
        <div class="auth-input-wrap">
          <input class="auth-input" type="password" id="auth-password" autocomplete="current-password" />
          <button type="button" class="auth-eye-btn" id="toggle-password" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-btn-primary" id="login-btn">Login</button>
    </form>

    <!-- Divider -->
    <p class="auth-divider-text">Or log in with:</p>

    <!-- Google button -->
    <button type="button" class="auth-btn-google" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google
    </button>

    <!-- Sign up -->
    <p class="auth-signup-text">
      No account yet? <button type="button" class="auth-signup-link" id="signup-toggle">Sign Up</button>
    </p>

  </div>

  <!-- Sign Up Modal (hidden by default) -->
  <div id="signup-overlay" class="auth-overlay" hidden>
    <div class="auth-card auth-card--signup">
      <h2 class="auth-heading">Create Account</h2>
      <p class="auth-subheading">Sign up to start taking notes</p>
      <div id="signup-error" class="auth-error" hidden></div>
      <form id="signup-form" class="auth-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="signup-email">Email Address</label>
          <input class="auth-input" type="email" id="signup-email" placeholder="email@example.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="signup-password">Password</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password" />
            <button type="button" class="auth-eye-btn" data-target="signup-password" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-btn-primary">Create Account</button>
      </form>
      <p class="auth-signup-text">
        Already have an account? <button type="button" class="auth-signup-link" id="back-to-login">Log In</button>
      </p>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
